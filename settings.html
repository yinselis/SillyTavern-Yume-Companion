<div id="yume-companion-settings" class="inline-drawer">
    <div class="inline-drawer-toggle inline-drawer-header">
        <b>🌸 梦向陪伴 设置</b>
        <div class="inline-drawer-icon fa-solid fa-circle-chevron-down"></div>
    </div>
    <div class="inline-drawer-content">
        <div class="settings_section">
            <div class="flex-container alignItemsCenter" style="margin-bottom: 5px;">
                <input type="checkbox" id="ym_setting_float">
                <label for="ym_setting_float">显示屏幕悬浮球</label>
            </div>
            
            <hr class="sysHR">
            
            <div class="yume-row-mini">
                <label>悬浮球图案(图片URL):</label>
                <input type="text" id="ym_float_icon" class="text_pole" placeholder="留空则显示默认🌸图标">
            </div>
            <div class="yume-row-mini">
                <label>纪念日(哪天在一起的):</label>
                <input type="date" id="ym_anniversary" class="text_pole">
            </div>

            <hr class="sysHR">
            <h4 style="color: #ff9a9e; margin-bottom: 5px;">🔌 独立后台 API (可选)</h4>
            <small style="opacity: 0.7; display: block; margin-bottom: 10px;">设置后，信笺、互动、日记将使用此独立API。留空则自动使用酒馆的“纯净生成通道”（不带任何世界书和格式污染）。</small>
            
            <div class="yume-row-mini">
                <label>API URL (如: https://api.openai.com/v1)</label>
                <input type="text" id="ym_api_url" class="text_pole" placeholder="留空使用默认">
            </div>
            <div class="yume-row-mini">
                <label>API Key</label>
                <input type="password" id="ym_api_key" class="text_pole" placeholder="sk-...">
            </div>
            <div class="yume-row-mini">
                <label>模型 (Model)</label>
                <input type="text" id="ym_api_model" class="text_pole" placeholder="gpt-4o-mini 或其他">
            </div>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button id="ym_btn_save_api" class="menu_button" style="flex: 1; border: 1px solid #ff9a9e; color: #ff9a9e; background: transparent;"><i class="fa-solid fa-floppy-disk"></i> 保存并测试连接</button>
            </div>
        </div>
    </div>
</div>
