<div id="yume-main-modal" class="theme-dark" style="display: none;">
    <!-- 头部 -->
    <div class="yume-modal-header">
        <div>
            <h3 id="yume-modal-title">🌸 专属手账</h3>
            <div id="yume-anniversary-text" style="font-size: 0.8em; opacity: 0.8;"></div>
        </div>
        <button id="yume-close-btn"><i class="fa-solid fa-xmark"></i></button>
    </div>
    
    <!-- 标签栏 -->
    <div class="yume-tabs">
        <div class="yume-tab active" data-target="yume-tab-profile">👤档案</div>
        <div class="yume-tab" data-target="yume-tab-interact">💬互动</div>
        <div class="yume-tab" data-target="yume-tab-letters">💌信笺</div>
        <div class="yume-tab" data-target="yume-tab-diary">📖日记</div>
        <div class="yume-tab" data-target="yume-tab-cards">📇字卡</div>
    </div>

    <!-- 内容区 -->
    <div class="yume-modal-content">
        <!-- 1. 档案 -->
        <div id="yume-tab-profile" class="yume-tab-pane active">
            <div class="yume-input-group">
                <label>🎨 手账主题</label>
                <select id="ym_theme_select" class="text_pole">
                    <option value="dark">🌙 暗夜樱花 (默认)</option>
                    <option value="light">☀️ 晨曦白纸</option>
                    <option value="matcha">🍵 抹茶信笺</option>
                    <option value="sakura">🌸 落樱缤纷 (精致)</option>
                    <option value="gothic">🍷 玫瑰暗影 (哥特)</option>
                </select>
            </div>
            <div style="display: flex; gap: 10px;">
                <div class="yume-input-group"><label>🎂 生日</label> <input type="text" id="ym_birth" class="text_pole"></div>
                <div class="yume-input-group"><label>✨ 性格</label> <input type="text" id="ym_mbti" class="text_pole"></div>
            </div>
            <!-- 删除了心情模块 -->
            <hr class="sysHR">
            <h4 style="color:var(--ym-primary); margin-bottom:10px;">🩸 生理期追踪</h4>
            <div style="display: flex; gap: 10px;">
                <div class="yume-input-group"><label>开始日期</label> <input type="date" id="ym_p_start" class="text_pole"></div>
                <div class="yume-input-group"><label>结束日期</label> <input type="date" id="ym_p_end" class="text_pole"></div>
            </div>
            <div style="display: flex; gap: 10px;">
                <div class="yume-input-group"><label>周期天数</label> <input type="number" id="ym_p_cycle" class="text_pole" value="28"></div>
                <div class="yume-input-group"><label>突发长信概率(%)</label> <input type="number" id="ym_random_letter_prob" class="text_pole" value="5" title="聊天时TA突然给你写长信的概率"></div>
            </div>
            <div id="yume-period-status" class="yume-highlight-box">请填写日期</div>
        </div>

        <!-- 2. 互动 -->
        <div id="yume-tab-interact" class="yume-tab-pane">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
                <button class="yume-btn-outline" onclick="yumeInteract('poke')">👉 戳脸颊</button>
                <button class="yume-btn-outline" onclick="yumeInteract('hug')">🫂 求抱抱</button>
                <button class="yume-btn-outline" onclick="yumeInteract('sleep')">🛌 哄睡觉</button>
                <button class="yume-btn-outline" onclick="yumeInteract('vent')">🌧️ 倒苦水</button>
            </div>
            <div id="yume-interact-result" style="display:none; background: rgba(128,128,128,0.1); border-radius: 12px; padding: 15px; min-height: 100px;">
                <div id="yume-interact-loading" style="text-align:center; color:var(--ym-primary); display:none;"><i class="fa-solid fa-spinner fa-spin"></i> TA正在靠近...</div>
                <div id="yume-interact-text" style="line-height: 1.6;"></div>
            </div>
        </div>

        <!-- 3. 信笺 -->
        <div id="yume-tab-letters" class="yume-tab-pane">
            <div style="display: flex; justify-content: flex-end; margin-bottom: 10px; flex-shrink: 0;">
                <button id="ym_btn_write_letter" class="yume-btn-outline" style="padding: 6px 15px;">+ 递交信笺</button>
            </div>
            
            <div id="yume-letter-writer" style="display:none; background: rgba(128,128,128,0.1); padding: 15px; border-radius: 12px; margin-bottom: 15px; flex-shrink: 0;">
                <textarea id="ym_letter_input" class="text_pole" rows="4" placeholder="写下想对TA说的话..."></textarea>
                <div style="display: flex; gap: 10px; margin: 10px 0;">
                    <select id="ym_letter_delay" class="text_pole" style="flex:1;">
                        <option value="3">短时等待 (聊3句后回信)</option>
                        <option value="10">长时等待 (聊10句后回信)</option>
                    </select>
                    <input type="number" id="ym_letter_depth" class="text_pole" style="flex:1;" placeholder="带入几条聊天记录" value="10">
                </div>
                <button id="ym_send_letter_btn" class="yume-btn" style="margin: 0; padding: 8px;">封装寄出</button>
            </div>

            <div id="yume-letters-history" class="ym-chat-list"></div>
        </div>

        <!-- 4. 日记 -->
        <div id="yume-tab-diary" class="yume-tab-pane">
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px; flex-shrink: 0;">
                <button id="ym_btn_write_diary" class="yume-btn-outline" style="width: 48%; margin: 0; padding: 8px;">+ 写日记</button>
                <button id="ym_btn_ai_diary" class="yume-btn-outline" style="width: 48%; margin: 0; padding: 8px;">偷看TA的日记</button>
            </div>
            
            <div id="yume-diary-writer" style="display:none; background: rgba(128,128,128,0.1); padding: 15px; border-radius: 12px; margin-bottom: 15px; flex-shrink: 0;">
                <textarea id="ym_diary_input" class="text_pole" rows="4" placeholder="今天发生了什么..."></textarea>
                <div style="display: flex; gap: 15px; margin: 10px 0;">
                    <label><input type="checkbox" id="ym_diary_public" checked> 允许TA偷看</label>
                    <label><input type="checkbox" id="ym_diary_reply"> 渴望TA的留言</label>
                </div>
                <button id="ym_save_diary_btn" class="yume-btn" style="margin: 0; padding: 8px;">锁上日记本</button>
            </div>

            <div id="yume-diary-history" class="ym-chat-list"></div>
        </div>

        <!-- 5. 字卡 -->
        <div id="yume-tab-cards" class="yume-tab-pane">
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px; flex-shrink: 0; gap: 5px;">
                <button id="ym_btn_manage_cards" class="yume-btn-outline" style="flex:1; padding: 6px;"><i class="fa-solid fa-list"></i> 管理字卡</button>
                <button id="ym_btn_ai_cards" class="yume-btn-outline" style="flex:1; padding: 6px;" title="根据酒馆聊天记录自动生成新字卡"><i class="fa-solid fa-wand-magic-sparkles"></i> 记录提取</button>
            </div>

            <div id="yume-card-manager" style="display:none; background: rgba(128,128,128,0.1); padding: 15px; border-radius: 12px; margin-bottom: 10px; flex-shrink: 0;">
                <p style="font-size:0.85em; opacity:0.8; margin-bottom:5px;">批量导入字卡 (每行一句)：</p>
                <textarea id="ym_card_import_input" class="text_pole" rows="4" placeholder="亲亲&#10;抱抱&#10;我在你身边"></textarea>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button id="ym_save_cards_btn" class="yume-btn" style="margin: 0; padding: 6px; flex:2;">导入追加</button>
                    <button id="ym_clear_cards_btn" class="yume-btn" style="margin: 0; padding: 6px; flex:1; background:#dc3545;">清空</button>
                </div>
                <div id="yume-card-count" style="margin-top:10px; font-size:0.85em; color:var(--ym-primary); text-align:center;">当前拥有字卡：0 句</div>
            </div>

            <div class="yume-wordcard-container">
                <div id="yume-card-chat-history" class="yume-wordcard-chat">
                    <!-- 聊天气泡区域 -->
                </div>
                <div class="yume-wordcard-input-area">
                    <input type="text" id="ym_card_chat_input" class="text_pole" style="flex:1;" placeholder="发送消息，触发字卡...">
                    <button id="ym_send_card_msg_btn" class="yume-btn" style="width:auto; padding: 0 15px; margin:0;"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="yume-floating-btn" title="长按拖动，点击打开"><span id="yume-float-text">🌸</span></div>
